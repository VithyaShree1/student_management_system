<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
}

.container{
width:420px;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
text-align:center;
}

.logo{
font-size:60px;
margin-bottom:10px;
}

h2{
color:#333;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;
}

input:focus{
outline:none;
border-color:#667eea;
}

button{
width:100%;
padding:14px;
margin-top:15px;
background:#667eea;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#5648c8;
}

.login-link{
margin-top:15px;
display:block;
text-decoration:none;
color:#667eea;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">🎓</div>

<h2>Student Registration</h2>

<form action="dashboard.html">

<input type="text" placeholder="Full Name" required>

<input type="email" placeholder="Email Address" required>

<input type="text" placeholder="Department" required>

<input type="password" placeholder="Password" required>

<button type="submit">Create Account</button>

</form>

<a href="login.html" class="login-link">
Already have an account? Login
</a>

</div>

</body>
</html>
