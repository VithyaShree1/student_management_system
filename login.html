
<!DOCTYPE html>
<html>
<head>
<title>Student Login</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#2193b0,#6dd5ed);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    background:white;
    padding:40px;
    border-radius:15px;
    width:350px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
    text-align:center;
}

h2{
    color:#2193b0;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    background:#2193b0;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#176d80;
}

a{
    text-decoration:none;
}
</style>

</head>

<body>

<div class="login-box">

<h2>Student Login</h2>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button>Login</button>

<br><br>

<a href="register.html">
<button type="button">Register</button>
</a>

</div>

</body>
</html>
